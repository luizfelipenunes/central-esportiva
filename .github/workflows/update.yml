name: Atualizar eventos reais

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v5

      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Gerar eventos.json
        run: |
          python - <<'PY'
          import json
          from urllib.request import Request, urlopen
          from urllib.parse import urlencode

          BASE_URL = "https://www.thesportsdb.com/api/v1/json/123/"

          def fetch_json(endpoint, params=None):
              url = BASE_URL + endpoint
              if params:
                  url += "?" + urlencode(params)
              req = Request(url, headers={"User-Agent": "CentralEsportiva/1.0"})
              with urlopen(req, timeout=30) as response:
                  return json.loads(response.read().decode("utf-8"))

          def format_event(event, esporte, transmissao, prioridade, origem):
              data = event.get("dateEvent") or ""
              hora = (event.get("strTime") or "00:00:00")[:5]
              titulo = event.get("strEvent")

              if not titulo:
                  home = event.get("strHomeTeam") or ""
                  away = event.get("strAwayTeam") or ""
                  if home and away:
                      titulo = f"{home} x {away}"
                  else:
                      titulo = "Evento esportivo"

              return {
                  "esporte": esporte,
                  "titulo": titulo,
                  "data": f"{data} {hora}".strip(),
                  "transmissao": transmissao,
                  "prioridade": prioridade,
                  "origem": origem
              }

          eventos = []

          fontes_times = [
              {
                  "team_name": "CR Vasco da Gama",
                  "esporte": "Futebol",
                  "transmissao": "Globo / SporTV / Premiere",
                  "prioridade": 1
              },
              {
                  "team_name": "Boston Celtics",
                  "esporte": "NBA",
                  "transmissao": "ESPN / SporTV / NBA League Pass",
                  "prioridade": 2
              },
              {
                  "team_name": "Seattle Seahawks",
                  "esporte": "NFL",
                  "transmissao": "ESPN / SporTV / NFL Game Pass",
                  "prioridade": 2
              }
          ]

          fontes_ligas = [
              {
                  "league_name": "Brazilian Serie A",
                  "esporte": "Futebol",
                  "transmissao": "Globo / SporTV / Premiere",
                  "prioridade": 3
              },
              {
                  "league_name": "Copa do Brasil",
                  "esporte": "Futebol",
                  "transmissao": "Globo / SporTV / Prime Video",
                  "prioridade": 3
              },
              {
                  "league_name": "UEFA Champions League",
                  "esporte": "Futebol",
                  "transmissao": "TNT Sports / Max / SBT",
                  "prioridade": 4
              }
          ]

          # 1) Times
          for fonte in fontes_times:
              try:
                  busca = fetch_json("searchteams.php", {"t": fonte["team_name"]})
                  teams = busca.get("teams") or []

                  if not teams:
                      eventos.append({
                          "esporte": fonte["esporte"],
                          "titulo": f"{fonte['team_name']} — time não encontrado na API",
                          "data": "",
                          "transmissao": "A confirmar",
                          "prioridade": fonte["prioridade"],
                          "origem": "diagnostico"
                      })
                      continue

                  team_id = teams[0].get("idTeam")
                  if not team_id:
                      eventos.append({
                          "esporte": fonte["esporte"],
                          "titulo": f"{fonte['team_name']} — idTeam ausente",
                          "data": "",
                          "transmissao": "A confirmar",
                          "prioridade": fonte["prioridade"],
                          "origem": "diagnostico"
                      })
                      continue

                  proximos = fetch_json("eventsnext.php", {"id": team_id})
                  eventos_time = proximos.get("events") or []

                  if not eventos_time:
                      eventos.append({
                          "esporte": fonte["esporte"],
                          "titulo": f"{fonte['team_name']} — sem próximos eventos na API",
                          "data": "",
                          "transmissao": "A confirmar",
                          "prioridade": fonte["prioridade"],
                          "origem": "diagnostico"
                      })
                      continue

                  for event in eventos_time[:10]:
                      eventos.append(
                          format_event(
                              event,
                              fonte["esporte"],
                              fonte["transmissao"],
                              fonte["prioridade"],
                              fonte["team_name"]
                          )
                      )

              except Exception as e:
                  eventos.append({
                      "esporte": fonte["esporte"],
                      "titulo": f"{fonte['team_name']} — erro: {str(e)}",
                      "data": "",
                      "transmissao": "A confirmar",
                      "prioridade": fonte["prioridade"],
                      "origem": "diagnostico"
                  })

          # 2) Ligas - tentativa simples por busca de nome
          all_leagues = []
          try:
              resp = fetch_json("all_leagues.php")
              all_leagues = resp.get("leagues") or []
          except Exception as e:
              eventos.append({
                  "esporte": "Sistema",
                  "titulo": f"Erro ao carregar ligas: {str(e)}",
                  "data": "",
                  "transmissao": "",
                  "prioridade": 99,
                  "origem": "diagnostico"
              })

          for fonte in fontes_ligas:
              try:
                  league_id = None
                  matched_name = None

                  for league in all_leagues:
                      nome_api = (league.get("strLeague") or "").strip().lower()
                      if fonte["league_name"].strip().lower() == nome_api:
                          league_id = league.get("idLeague")
                          matched_name = league.get("strLeague")
                          break

                  if not league_id:
                      eventos.append({
                          "esporte": fonte["esporte"],
                          "titulo": f"{fonte['league_name']} — liga não encontrada em all_leagues",
                          "data": "",
                          "transmissao": "",
                          "prioridade": fonte["prioridade"],
                          "origem": "diagnostico"
                      })
                      continue

                  proximos = fetch_json("eventsnextleague.php", {"id": league_id})
                  eventos_liga = proximos.get("events") or []

                  if not eventos_liga:
                      eventos.append({
                          "esporte": fonte["esporte"],
                          "titulo": f"{matched_name} — sem próximos eventos na API",
                          "data": "",
                          "transmissao": "",
                          "prioridade": fonte["prioridade"],
                          "origem": "diagnostico"
                      })
                      continue

                  for event in eventos_liga[:8]:
                      eventos.append(
                          format_event(
                              event,
                              fonte["esporte"],
                              fonte["transmissao"],
                              fonte["prioridade"],
                              matched_name
                          )
                      )

              except Exception as e:
                  eventos.append({
                      "esporte": fonte["esporte"],
                      "titulo": f"{fonte['league_name']} — erro: {str(e)}",
                      "data": "",
                      "transmissao": "",
                      "prioridade": fonte["prioridade"],
                      "origem": "diagnostico"
                  })

          # remove duplicados
          vistos = set()
          eventos_unicos = []

          for e in eventos:
              chave = (e.get("titulo", ""), e.get("data", ""))
              if chave not in vistos:
                  vistos.add(chave)
                  eventos_unicos.append(e)

          eventos_unicos.sort(key=lambda x: (x.get("prioridade", 99), x.get("data", "")))

          with open("eventos.json", "w", encoding="utf-8") as f:
              json.dump(eventos_unicos, f, ensure_ascii=False, indent=2)

          print(f"{len(eventos_unicos)} eventos salvos em eventos.json")
          PY

      - name: Commit e push
        run: |
          git config --global user.name "central-esportiva-bot"
          git config --global user.email "bot@users.noreply.github.com"
          git add eventos.json
          if ! git diff --cached --quiet; then
            git commit -m "Atualização automática de eventos"
            git push
          else
            echo "Sem mudanças para commit"
          fi
