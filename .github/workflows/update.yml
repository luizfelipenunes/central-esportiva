name: Atualizar eventos reais

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v5

      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Gerar eventos.json
        run: |
          python - <<'PY'
          import json
          import datetime as dt
          from zoneinfo import ZoneInfo
          from urllib.request import Request, urlopen
          from urllib.parse import urlencode

          BASE_URL = "https://www.thesportsdb.com/api/v1/json/123/"
          TZ_LOCAL = ZoneInfo("America/Sao_Paulo")
          TZ_UTC = dt.timezone.utc
          HOJE_LOCAL = dt.datetime.now(TZ_LOCAL).date()

          def fetch_json(endpoint, params=None):
              url = BASE_URL + endpoint
              if params:
                  url += "?" + urlencode(params)
              req = Request(url, headers={"User-Agent": "CentralEsportiva/1.0"})
              with urlopen(req, timeout=30) as response:
                  return json.loads(response.read().decode("utf-8"))

          def normalizar(texto):
              return (texto or "").strip().lower()

          def parse_event_datetime(event):
              ts = event.get("strTimestamp")
              if ts:
                  try:
                      parsed = dt.datetime.fromisoformat(ts.replace("Z", "+00:00"))
                      if parsed.tzinfo is None:
                          parsed = parsed.replace(tzinfo=TZ_UTC)
                      return parsed.astimezone(TZ_LOCAL)
                  except Exception:
                      pass

              date_value = event.get("dateEvent") or event.get("dateEventLocal")
              time_value = (event.get("strTime") or "00:00:00")[:8]

              if not date_value:
                  return None

              try:
                  parsed = dt.datetime.fromisoformat(f"{date_value}T{time_value}")
                  parsed = parsed.replace(tzinfo=TZ_UTC)
                  return parsed.astimezone(TZ_LOCAL)
              except Exception:
                  return None

          def titulo_evento(event):
              titulo = event.get("strEvent")
              if titulo:
                  return titulo

              home = event.get("strHomeTeam") or ""
              away = event.get("strAwayTeam") or ""
              if home and away:
                  return f"{home} vs {away}"
              return "Evento esportivo"

          def format_event(event, esporte, transmissao, prioridade, origem):
              local_dt = parse_event_datetime(event)
              if local_dt:
                  data_exibicao = local_dt.strftime("%d/%m")
                  hora_exibicao = local_dt.strftime("%H:%M")
                  data_ordem = local_dt.isoformat()
              else:
                  data_exibicao = ""
                  hora_exibicao = ""
                  data_ordem = ""

              return {
                  "esporte": esporte,
                  "titulo": titulo_evento(event),
                  "data": data_exibicao,
                  "hora": hora_exibicao,
                  "data_ordem": data_ordem,
                  "transmissao": transmissao,
                  "prioridade": prioridade,
                  "origem": origem
              }

          def adicionar_diagnostico(eventos, esporte, titulo, prioridade):
              eventos.append({
                  "esporte": esporte,
                  "titulo": titulo,
                  "data": "",
                  "hora": "",
                  "data_ordem": "",
                  "transmissao": "A confirmar",
                  "prioridade": prioridade,
                  "origem": "diagnostico"
              })

          def buscar_time(team_name, esporte, transmissao, prioridade, eventos):
              try:
                  busca = fetch_json("searchteams.php", {"t": team_name})
                  teams = busca.get("teams") or []

                  if not teams:
                      adicionar_diagnostico(eventos, esporte, f"{team_name} — time não encontrado na API", prioridade)
                      return

                  team_id = teams[0].get("idTeam")
                  if not team_id:
                      adicionar_diagnostico(eventos, esporte, f"{team_name} — idTeam ausente", prioridade)
                      return

                  proximos = fetch_json("eventsnext.php", {"id": team_id})
                  eventos_time = proximos.get("events") or []

                  if not eventos_time:
                      ultimos = fetch_json("eventslast.php", {"id": team_id})
                      eventos_last = ultimos.get("results") or ultimos.get("events") or []

                      if eventos_last:
                          for event in eventos_last[:3]:
                              item = format_event(event, esporte, transmissao, prioridade, team_name + " (últimos)")
                              eventos.append(item)
                      else:
                          adicionar_diagnostico(eventos, esporte, f"{team_name} — sem próximos eventos na API", prioridade)
                      return

                  for event in eventos_time[:10]:
                      eventos.append(format_event(event, esporte, transmissao, prioridade, team_name))

              except Exception as e:
                  adicionar_diagnostico(eventos, esporte, f"{team_name} — erro: {str(e)}", prioridade)

          def buscar_liga_por_id(league_id, nome, esporte, transmissao, prioridade, eventos, excluir=None):
              excluir = [normalizar(x) for x in (excluir or [])]

              try:
                  proximos = fetch_json("eventsnextleague.php", {"id": league_id})
                  eventos_liga = proximos.get("events") or []

                  if not eventos_liga:
                      adicionar_diagnostico(eventos, esporte, f"{nome} — sem próximos eventos na API", prioridade)
                      return

                  encontrados = 0
                  for event in eventos_liga[:12]:
                      titulo = normalizar(event.get("strEvent"))
                      if any(x in titulo for x in excluir):
                          continue

                      item = format_event(event, esporte, transmissao, prioridade, nome)
                      eventos.append(item)
                      encontrados += 1

                  if encontrados == 0:
                      adicionar_diagnostico(eventos, esporte, f"{nome} — eventos filtrados", prioridade)

              except Exception as e:
                  adicionar_diagnostico(eventos, esporte, f"{nome} — erro: {str(e)}", prioridade)

          def buscar_futebol_por_dia(eventos):
              league_map = {
                  "4351": ("Brasileirão", "Globo / SporTV / Premiere", 3),
                  "4725": ("Copa do Brasil", "Globo / SporTV / Prime Video", 3),
                  "4501": ("Libertadores", "Globo / ESPN / Disney+", 3),
                  "4724": ("Sul-Americana", "ESPN / Disney+", 3),
                  "4480": ("UEFA Champions League", "TNT Sports / Max / SBT", 4),
                  "4429": ("FIFA World Cup", "CazéTV / Globo / SporTV", 4)
              }

              excluir_comp = {
                  "4429": ["women", "qualifying", "qualification", "qualifiers", "u17", "u20"],
                  "4480": ["women", "youth", "u19", "u21"]
              }

              encontrados = {k: 0 for k in league_map.keys()}

              for offset in range(0, 14):
                  dia = HOJE_LOCAL + dt.timedelta(days=offset)
                  dia_str = dia.strftime("%Y-%m-%d")

                  try:
                      resp = fetch_json("eventsday.php", {"d": dia_str, "s": "Soccer"})
                      lista = resp.get("events") or []
                  except Exception:
                      continue

                  for event in lista:
                      id_league = str(event.get("idLeague") or "")
                      if id_league not in league_map:
                          continue

                      titulo_norm = normalizar(event.get("strEvent"))
                      if any(x in titulo_norm for x in excluir_comp.get(id_league, [])):
                          continue

                      nome, transmissao, prioridade = league_map[id_league]
                      eventos.append(format_event(event, "Futebol", transmissao, prioridade, nome))
                      encontrados[id_league] += 1

              for id_league, qtd in encontrados.items():
                  if qtd == 0:
                      nome, _, prioridade = league_map[id_league]
                      adicionar_diagnostico(eventos, "Futebol", f"{nome} — sem jogos nos próximos 14 dias", prioridade)

          eventos = []

          # Times prioritários
          buscar_time(
              "Vasco da Gama",
              "Futebol",
              "Globo / SporTV / Premiere",
              1,
              eventos
          )

          buscar_time(
              "Boston Celtics",
              "NBA",
              "ESPN / SporTV / NBA League Pass",
              2,
              eventos
          )

          buscar_time(
              "Seattle Seahawks",
              "NFL",
              "ESPN / SporTV / NFL Game Pass",
              2,
              eventos
          )

          # Futebol por dia (todos os jogos do dia nas competições desejadas)
          buscar_futebol_por_dia(eventos)

          # Automobilismo
          buscar_liga_por_id(
              "4370",
              "Formula 1",
              "Automobilismo",
              "Globo / SporTV / F1TV",
              2,
              eventos
          )

          buscar_liga_por_id(
              "4486",
              "Formula 2",
              "Automobilismo",
              "SporTV / F1TV",
              2,
              eventos
          )

          buscar_liga_por_id(
              "4407",
              "MotoGP",
              "Automobilismo",
              "ESPN / Disney+",
              2,
              eventos
          )

          buscar_liga_por_id(
              "4373",
              "IndyCar",
              "Automobilismo",
              "ESPN / Disney+",
              2,
              eventos
          )

          # limpa falsos positivos no automobilismo
          eventos_filtrados = []
          for e in eventos:
              titulo = normalizar(e.get("titulo"))
              if e.get("esporte") == "Automobilismo" and " vs " in titulo:
                  continue
              eventos_filtrados.append(e)

          # remove duplicados
          vistos = set()
          eventos_unicos = []

          for e in eventos_filtrados:
              chave = (
                  e.get("titulo", ""),
                  e.get("data_ordem", ""),
                  e.get("origem", "")
              )
              if chave not in vistos:
                  vistos.add(chave)
                  eventos_unicos.append(e)

          eventos_unicos.sort(
              key=lambda x: (
                  x.get("prioridade", 99),
                  x.get("data_ordem", "9999-99-99T99:99:99")
              )
          )

          with open("eventos.json", "w", encoding="utf-8") as f:
              json.dump(eventos_unicos, f, ensure_ascii=False, indent=2)

          print(f"{len(eventos_unicos)} eventos salvos em eventos.json")
          PY

      - name: Commit e push
        run: |
          git config --global user.name "central-esportiva-bot"
          git config --global user.email "bot@users.noreply.github.com"
          git add eventos.json
          if ! git diff --cached --quiet; then
            git commit -m "Atualização automática de eventos"
            git push
          else
            echo "Sem mudanças para commit"
          fi
