name: Atualizar base esportiva

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Rodar pipeline
        env:
          TENNIS_RAPIDAPI_KEY: ${{ secrets.TENNIS_RAPIDAPI_KEY }}
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          FOOTBALL_DATA_KEY: ${{ secrets.FOOTBALL_DATA_KEY }}
        run: |
          python scripts/gerar_saida.py

      - name: Commit e push
        run: |
          git config --global user.name "central-esportiva-bot"
          git config --global user.email "bot@users.noreply.github.com"
          git add data/
          git commit -m "Atualização automática da base esportiva" || echo "Sem mudanças"
          git push
