name: Atualizar eventos reais

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v5

      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Gerar eventos.json
        run: |
          python - <<'PY'
          import json
          from urllib.request import Request, urlopen
          from urllib.parse import urlencode

          BASE_URL = "https://www.thesportsdb.com/api/v1/json/123/"

          def fetch_json(endpoint, params=None):
              url = BASE_URL + endpoint
              if params:
                  url += "?" + urlencode(params)
              req = Request(url, headers={"User-Agent": "CentralEsportiva/1.0"})
              with urlopen(req, timeout=30) as response:
                  return json.loads(response.read().decode("utf-8"))

          def normalizar(texto):
              return (texto or "").strip().lower()

          def format_event(event, esporte, transmissao, prioridade, origem):
              data = event.get("dateEvent") or ""
              hora = (event.get("strTime") or "00:00:00")[:5]
              titulo = event.get("strEvent")

              if not titulo:
                  home = event.get("strHomeTeam") or ""
                  away = event.get("strAwayTeam") or ""
                  if home and away:
                      titulo = f"{home} vs {away}"
                  else:
                      titulo = "Evento esportivo"

              return {
                  "esporte": esporte,
                  "titulo": titulo,
                  "data": f"{data} {hora}".strip(),
                  "transmissao": transmissao,
                  "prioridade": prioridade,
                  "origem": origem
              }

          def adicionar_diagnostico(eventos, esporte, titulo, prioridade):
              eventos.append({
                  "esporte": esporte,
                  "titulo": titulo,
                  "data": "",
                  "transmissao": "A confirmar",
                  "prioridade": prioridade,
                  "origem": "diagnostico"
              })

          def buscar_time(team_name, esporte, transmissao, prioridade, eventos):
              try:
                  busca = fetch_json("searchteams.php", {"t": team_name})
                  teams = busca.get("teams") or []

                  if not teams:
                      adicionar_diagnostico(eventos, esporte, f"{team_name} — time não encontrado na API", prioridade)
                      return

                  team_id = teams[0].get("idTeam")
                  if not team_id:
                      adicionar_diagnostico(eventos, esporte, f"{team_name} — idTeam ausente", prioridade)
                      return

                  proximos = fetch_json("eventsnext.php", {"id": team_id})
                  eventos_time = proximos.get("events") or []

                  if not eventos_time:
                      ultimos = fetch_json("eventslast.php", {"id": team_id})
                      eventos_last = ultimos.get("results") or ultimos.get("events") or []

                      if eventos_last:
                          for event in eventos_last[:3]:
                              item = format_event(event, esporte, transmissao, prioridade, team_name + " (últimos)")
                              if item["data"]:
                                  eventos.append(item)
                      else:
                          adicionar_diagnostico(eventos, esporte, f"{team_name} — sem próximos eventos na API", prioridade)
                      return

                  for event in eventos_time[:10]:
                      eventos.append(format_event(event, esporte, transmissao, prioridade, team_name))

              except Exception as e:
                  adicionar_diagnostico(eventos, esporte, f"{team_name} — erro: {str(e)}", prioridade)

          def buscar_todas_ligas():
              try:
                  resp = fetch_json("all_leagues.php")
                  return resp.get("leagues") or []
              except Exception:
                  return []

          def resolver_liga(todas_ligas, aliases, esporte_esperado=None, excluir_termos=None):
              aliases_norm = [normalizar(a) for a in aliases]
              excluir_norm = [normalizar(x) for x in (excluir_termos or [])]
              esporte_norm = normalizar(esporte_esperado)

              candidatas = []

              for liga in todas_ligas:
                  nome = normalizar(liga.get("strLeague"))
                  esporte = normalizar(liga.get("strSport"))

                  if esporte_norm and esporte != esporte_norm:
                      continue

                  if any(x in nome for x in excluir_norm):
                      continue

                  for alias in aliases_norm:
                      if nome == alias:
                          return liga

                  for alias in aliases_norm:
                      if alias in nome or nome in alias:
                          candidatas.append(liga)
                          break

              if candidatas:
                  candidatas.sort(key=lambda l: len(normalizar(l.get("strLeague"))))
                  return candidatas[0]

              return None

          eventos = []

          # Times prioritários
          buscar_time(
              "Vasco da Gama",
              "Futebol",
              "Globo / SporTV / Premiere",
              1,
              eventos
          )

          buscar_time(
              "Boston Celtics",
              "NBA",
              "ESPN / SporTV / NBA League Pass",
              2,
              eventos
          )

          buscar_time(
              "Seattle Seahawks",
              "NFL",
              "ESPN / SporTV / NFL Game Pass",
              2,
              eventos
          )

          # Todas as ligas disponíveis
          todas_ligas = buscar_todas_ligas()

          # Ligas de futebol
          fontes_ligas = [
              {
                  "aliases": [
                      "Brazil Serie A",
                      "Brazilian Serie A",
                      "Campeonato Brasileiro Serie A",
                      "Brasileirao Serie A",
                      "Serie A Brazil"
                  ],
                  "nome_exibicao": "Brasileirão",
                  "esporte": "Futebol",
                  "transmissao": "Globo / SporTV / Premiere",
                  "prioridade": 3,
                  "esporte_api": "soccer",
                  "excluir": []
              },
              {
                  "aliases": [
                      "Copa do Brasil"
                  ],
                  "nome_exibicao": "Copa do Brasil",
                  "esporte": "Futebol",
                  "transmissao": "Globo / SporTV / Prime Video",
                  "prioridade": 3,
                  "esporte_api": "soccer",
                  "excluir": []
              },
              {
                  "aliases": [
                      "CONMEBOL Libertadores",
                      "Copa Libertadores",
                      "Libertadores"
                  ],
                  "nome_exibicao": "Libertadores",
                  "esporte": "Futebol",
                  "transmissao": "Globo / ESPN / Disney+",
                  "prioridade": 3,
                  "esporte_api": "soccer",
                  "excluir": ["women", "femenina", "feminina"]
              },
              {
                  "aliases": [
                      "CONMEBOL Sudamericana",
                      "Copa Sudamericana",
                      "Sudamericana",
                      "Sul-Americana"
                  ],
                  "nome_exibicao": "Sul-Americana",
                  "esporte": "Futebol",
                  "transmissao": "ESPN / Disney+",
                  "prioridade": 3,
                  "esporte_api": "soccer",
                  "excluir": ["women", "femenina", "feminina"]
              },
              {
                  "aliases": [
                      "UEFA Champions League",
                      "Champions League"
                  ],
                  "nome_exibicao": "Champions League",
                  "esporte": "Futebol",
                  "transmissao": "TNT Sports / Max / SBT",
                  "prioridade": 4,
                  "esporte_api": "soccer",
                  "excluir": ["women", "youth", "u19", "u21"]
              },
              {
                  "aliases": [
                      "FIFA World Cup",
                      "World Cup"
                  ],
                  "nome_exibicao": "Copa do Mundo",
                  "esporte": "Futebol",
                  "transmissao": "CazéTV / Globo / SporTV",
                  "prioridade": 4,
                  "esporte_api": "soccer",
                  "excluir": ["women", "qualifying", "qualification", "qualifiers", "u17", "u20"]
              }
          ]

          for fonte in fontes_ligas:
              try:
                  liga = resolver_liga(
                      todas_ligas,
                      fonte["aliases"],
                      fonte["esporte_api"],
                      fonte["excluir"]
                  )

                  if not liga:
                      adicionar_diagnostico(
                          eventos,
                          fonte["esporte"],
                          f"{fonte['nome_exibicao']} — liga não encontrada",
                          fonte["prioridade"]
                      )
                      continue

                  league_id = liga.get("idLeague")
                  league_name = liga.get("strLeague") or fonte["nome_exibicao"]

                  proximos = fetch_json("eventsnextleague.php", {"id": league_id})
                  eventos_liga = proximos.get("events") or []

                  if not eventos_liga:
                      adicionar_diagnostico(
                          eventos,
                          fonte["esporte"],
                          f"{league_name} — sem próximos eventos na API",
                          fonte["prioridade"]
                      )
                      continue

                  for event in eventos_liga[:8]:
                      eventos.append(
                          format_event(
                              event,
                              fonte["esporte"],
                              fonte["transmissao"],
                              fonte["prioridade"],
                              league_name
                          )
                      )

              except Exception as e:
                  adicionar_diagnostico(
                      eventos,
                      fonte["esporte"],
                      f"{fonte['nome_exibicao']} — erro: {str(e)}",
                      fonte["prioridade"]
                  )

          # Automobilismo
          ligas_auto = [
              {
                  "id": "4370",
                  "nome": "Formula 1",
                  "esporte": "Automobilismo",
                  "transmissao": "Globo / SporTV / F1TV",
                  "prioridade": 2
              },
              {
                  "id": "4486",
                  "nome": "Formula 2",
                  "esporte": "Automobilismo",
                  "transmissao": "SporTV / F1TV",
                  "prioridade": 2
              },
              {
                  "id": "4407",
                  "nome": "MotoGP",
                  "esporte": "Automobilismo",
                  "transmissao": "ESPN / Disney+",
                  "prioridade": 2
              },
              {
                  "id": "4373",
                  "nome": "IndyCar",
                  "esporte": "Automobilismo",
                  "transmissao": "ESPN / Disney+",
                  "prioridade": 2
              }
          ]

          for liga in ligas_auto:
              try:
                  proximos = fetch_json("eventsnextleague.php", {"id": liga["id"]})
                  eventos_liga = proximos.get("events") or []

                  if not eventos_liga:
                      adicionar_diagnostico(
                          eventos,
                          liga["esporte"],
                          f"{liga['nome']} — sem próximos eventos na API",
                          liga["prioridade"]
                      )
                      continue

                  for event in eventos_liga[:6]:
                      item = format_event(
                          event,
                          liga["esporte"],
                          liga["transmissao"],
                          liga["prioridade"],
                          liga["nome"]
                      )

                      titulo_lower = normalizar(item["titulo"])
                      if " vs " in titulo_lower and ("formula" in normalizar(liga["nome"]) or "motogp" in normalizar(liga["nome"]) or "indy" in normalizar(liga["nome"])):
                          continue

                      eventos.append(item)

              except Exception as e:
                  adicionar_diagnostico(
                      eventos,
                      liga["esporte"],
                      f"{liga['nome']} — erro: {str(e)}",
                      liga["prioridade"]
                  )

          # remove duplicados
          vistos = set()
          eventos_unicos = []

          for e in eventos:
              chave = (e.get("titulo", ""), e.get("data", ""), e.get("origem", ""))
              if chave not in vistos:
                  vistos.add(chave)
                  eventos_unicos.append(e)

          eventos_unicos.sort(key=lambda x: (x.get("prioridade", 99), x.get("data", "")))

          with open("eventos.json", "w", encoding="utf-8") as f:
              json.dump(eventos_unicos, f, ensure_ascii=False, indent=2)

          print(f"{len(eventos_unicos)} eventos salvos em eventos.json")
          PY

      - name: Commit e push
        run: |
          git config --global user.name "central-esportiva-bot"
          git config --global user.email "bot@users.noreply.github.com"
          git add eventos.json
          if ! git diff --cached --quiet; then
            git commit -m "Atualização automática de eventos"
            git push
          else
            echo "Sem mudanças para commit"
          fi
