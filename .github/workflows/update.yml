name: Atualizar eventos reais

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v5

      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Gerar eventos.json
        run: |
          python - <<'PY'
          import json
          from urllib.request import Request, urlopen
          from urllib.parse import urlencode

          BASE_URL = "https://www.thesportsdb.com/api/v1/json/3/"

          def fetch_json(endpoint, params=None):
              url = BASE_URL + endpoint
              if params:
                  url += "?" + urlencode(params)
              req = Request(url, headers={"User-Agent": "CentralEsportiva/1.0"})
              with urlopen(req, timeout=30) as response:
                  return json.loads(response.read().decode("utf-8"))

          def format_event(event, esporte, transmissao, prioridade, sufixo=None):
              data = event.get("dateEvent") or ""
              hora = (event.get("strTime") or "00:00:00")[:5]

              titulo = event.get("strEvent")
              if not titulo:
                  home = event.get("strHomeTeam") or ""
                  away = event.get("strAwayTeam") or ""
                  if home and away:
                      titulo = f"{home} x {away}"
                  else:
                      titulo = "Evento esportivo"

              if sufixo:
                  titulo = f"{titulo} ({sufixo})"

              return {
                  "esporte": esporte,
                  "titulo": titulo,
                  "data": f"{data} {hora}".strip(),
                  "transmissao": transmissao,
                  "prioridade": prioridade
              }

          eventos = []

          # Times prioritários
          fontes_times = [
              {
                  "team_name": "CR Vasco da Gama",
                  "esporte": "Futebol",
                  "transmissao": "Globo / SporTV / Premiere",
                  "prioridade": 1
              },
              {
                  "team_name": "Boston Celtics",
                  "esporte": "NBA",
                  "transmissao": "ESPN / SporTV / NBA League Pass",
                  "prioridade": 2
              },
              {
                  "team_name": "Seattle Seahawks",
                  "esporte": "NFL",
                  "transmissao": "ESPN / SporTV / NFL Game Pass",
                  "prioridade": 2
              }
          ]

          # Ligas/competições
          fontes_ligas = [
              {
                  "league_id": "4351",
                  "nome": "Brasileirão",
                  "esporte": "Futebol",
                  "transmissao": "Globo / SporTV / Premiere",
                  "prioridade": 3
              },
              {
                  "league_id": "4725",
                  "nome": "Copa do Brasil",
                  "esporte": "Futebol",
                  "transmissao": "Globo / SporTV / Prime Video",
                  "prioridade": 3
              },
              {
                  "league_id": "4501",
                  "nome": "Libertadores",
                  "esporte": "Futebol",
                  "transmissao": "Globo / ESPN / Disney+",
                  "prioridade": 3
              },
              {
                  "league_id": "4724",
                  "nome": "Sul-Americana",
                  "esporte": "Futebol",
                  "transmissao": "ESPN / Disney+",
                  "prioridade": 3
              },
              {
                  "league_id": "4480",
                  "nome": "Champions League",
                  "esporte": "Futebol",
                  "transmissao": "TNT Sports / Max / SBT",
                  "prioridade": 4
              },
              {
                  "league_id": "4429",
                  "nome": "Copa do Mundo",
                  "esporte": "Futebol",
                  "transmissao": "CazéTV / Globo / SporTV",
                  "prioridade": 4
              }
          ]

          # Automobilismo e outras categorias por liga
          fontes_ligas_extra = [
              {
                  "league_id": "4370",
                  "nome": "Formula 1",
                  "esporte": "Automobilismo",
                  "transmissao": "Globo / SporTV / F1TV",
                  "prioridade": 2
              },
              {
                  "league_id": "4486",
                  "nome": "Formula 2",
                  "esporte": "Automobilismo",
                  "transmissao": "SporTV / F1TV",
                  "prioridade": 2
              },
              {
                  "league_id": "4407",
                  "nome": "MotoGP",
                  "esporte": "Automobilismo",
                  "transmissao": "ESPN / Disney+",
                  "prioridade": 2
              },
              {
                  "league_id": "4373",
                  "nome": "IndyCar",
                  "esporte": "Automobilismo",
                  "transmissao": "ESPN / Disney+",
                  "prioridade": 2
              },
              {
                  "league_id": "4413",
                  "nome": "WEC",
                  "esporte": "Automobilismo",
                  "transmissao": "BandSports / YouTube",
                  "prioridade": 2
              },
              {
                  "league_id": "4488",
                  "nome": "IMSA",
                  "esporte": "Automobilismo",
                  "transmissao": "IMSA TV / YouTube",
                  "prioridade": 2
              }
          ]

          # Busca por times
          for fonte in fontes_times:
              try:
                  busca = fetch_json("searchteams.php", {"t": fonte["team_name"]})
                  teams = busca.get("teams") or []
                  if not teams:
                      continue

                  team_id = teams[0].get("idTeam")
                  if not team_id:
                      continue

                  proximos = fetch_json("eventsnext.php", {"id": team_id})
                  eventos_time = proximos.get("events") or []

                  for event in eventos_time[:10]:
                      eventos.append(
                          format_event(
                              event,
                              fonte["esporte"],
                              fonte["transmissao"],
                              fonte["prioridade"]
                          )
                      )

              except Exception as e:
                  print(f"Erro ao buscar {fonte['team_name']}: {e}")

          # Busca por ligas
          for fonte in fontes_ligas + fontes_ligas_extra:
              try:
                  proximos = fetch_json("eventsnextleague.php", {"id": fonte["league_id"]})
                  eventos_liga = proximos.get("events") or []

                  for event in eventos_liga[:12]:
                      titulo_evento = (event.get("strEvent") or "").lower()

                      # João Fonseca e Grand Slams entram depois, em etapa separada
                      eventos.append(
                          format_event(
                              event,
                              fonte["esporte"],
                              fonte["transmissao"],
                              fonte["prioridade"],
                              fonte["nome"]
                          )
                      )

              except Exception as e:
                  print(f"Erro ao buscar liga {fonte['nome']}: {e}")

          # Remove duplicados simples
          vistos = set()
          eventos_unicos = []

          for e in eventos:
              chave = (e["titulo"], e["data"])
              if chave not in vistos:
                  vistos.add(chave)
                  eventos_unicos.append(e)

          eventos_unicos.sort(key=lambda x: (x.get("prioridade", 9), x.get("data", "")))

          if not eventos_unicos:
              eventos_unicos = [
                  {
                      "esporte": "Futebol",
                      "titulo": "Nenhum evento encontrado no momento",
                      "data": "",
                      "transmissao": "A confirmar",
                      "prioridade": 9
                  }
              ]

          with open("eventos.json", "w", encoding="utf-8") as f:
              json.dump(eventos_unicos, f, ensure_ascii=False, indent=2)

          print(f"{len(eventos_unicos)} eventos salvos em eventos.json")
          PY

      - name: Commit e push
        run: |
          git config --global user.name "central-esportiva-bot"
          git config --global user.email "bot@users.noreply.github.com"
          git add eventos.json
          if ! git diff --cached --quiet; then
            git commit -m "Atualização automática de eventos"
            git push
          else
            echo "Sem mudanças para commit"
          fi
