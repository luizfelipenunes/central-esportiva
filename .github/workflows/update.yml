name: Atualizar eventos reais

on:
  schedule:
    - cron: "0 */8 * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v5

      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Gerar eventos.json
        run: |
          python - <<'PY'
          import json
          import time
          import datetime as dt
          from zoneinfo import ZoneInfo
          from urllib.request import Request, urlopen
          from urllib.parse import urlencode
          from urllib.error import HTTPError

          BASE_URL = "https://www.thesportsdb.com/api/v1/json/123/"
          TZ_LOCAL = ZoneInfo("America/Sao_Paulo")
          TZ_UTC = dt.timezone.utc
          HOJE_LOCAL = dt.datetime.now(TZ_LOCAL).date()
          LIMITE_DIAS = 7

          def fetch_json(endpoint, params=None, retries=3, sleep_seconds=2):
              url = BASE_URL + endpoint
              if params:
                  url += "?" + urlencode(params)

              last_error = None

              for attempt in range(retries):
                  try:
                      req = Request(url, headers={"User-Agent": "CentralEsportiva/1.0"})
                      with urlopen(req, timeout=30) as response:
                          return json.loads(response.read().decode("utf-8"))
                  except HTTPError as e:
                      last_error = e
                      if e.code == 429 and attempt < retries - 1:
                          time.sleep(sleep_seconds * (attempt + 1))
                          continue
                      raise
                  except Exception as e:
                      last_error = e
                      if attempt < retries - 1:
                          time.sleep(sleep_seconds)
                          continue
                      raise

              raise last_error

          def normalizar(texto):
              return (texto or "").strip().lower()

          def parse_event_datetime(event):
              ts = event.get("strTimestamp")
              if ts:
                  try:
                      parsed = dt.datetime.fromisoformat(ts.replace("Z", "+00:00"))
                      if parsed.tzinfo is None:
                          parsed = parsed.replace(tzinfo=TZ_UTC)
                      return parsed.astimezone(TZ_LOCAL)
                  except Exception:
                      pass

              date_value = event.get("dateEvent") or event.get("dateEventLocal")
              time_value = (event.get("strTime") or "00:00:00")[:8]

              if not date_value:
                  return None

              try:
                  parsed = dt.datetime.fromisoformat(f"{date_value}T{time_value}")
                  parsed = parsed.replace(tzinfo=TZ_UTC)
                  return parsed.astimezone(TZ_LOCAL)
              except Exception:
                  return None

          def esta_no_periodo(event):
              local_dt = parse_event_datetime(event)
              if not local_dt:
                  return False
              delta = (local_dt.date() - HOJE_LOCAL).days
              return 0 <= delta < LIMITE_DIAS

          def titulo_evento(event):
              titulo = event.get("strEvent")
              if titulo:
                  return titulo

              home = event.get("strHomeTeam") or ""
              away = event.get("strAwayTeam") or ""
              if home and away:
                  return f"{home} vs {away}"
              return "Evento esportivo"

          def prioridade_futebol(titulo, prioridade_base):
              titulo_norm = normalizar(titulo)
              if "vasco" in titulo_norm:
                  return 1
              return prioridade_base

          def format_event(event, esporte, transmissao, prioridade, origem):
              local_dt = parse_event_datetime(event)
              titulo = titulo_evento(event)

              if local_dt:
                  data_exibicao = local_dt.strftime("%d/%m")
                  hora_exibicao = local_dt.strftime("%H:%M")
                  data_ordem = local_dt.isoformat()
              else:
                  data_exibicao = ""
                  hora_exibicao = ""
                  data_ordem = ""

              prioridade_final = prioridade
              if esporte == "Futebol":
                  prioridade_final = prioridade_futebol(titulo, prioridade)

              return {
                  "esporte": esporte,
                  "titulo": titulo,
                  "data": data_exibicao,
                  "hora": hora_exibicao,
                  "data_ordem": data_ordem,
                  "transmissao": transmissao,
                  "prioridade": prioridade_final,
                  "origem": origem
              }

          def adicionar_diagnostico(eventos, esporte, titulo, prioridade):
              eventos.append({
                  "esporte": esporte,
                  "titulo": titulo,
                  "data": "",
                  "hora": "",
                  "data_ordem": "",
                  "transmissao": "A confirmar",
                  "prioridade": prioridade,
                  "origem": "diagnostico"
              })

          def buscar_time(team_name, esporte, transmissao, prioridade, eventos):
              try:
                  busca = fetch_json("searchteams.php", {"t": team_name})
                  teams = busca.get("teams") or []

                  if not teams:
                      adicionar_diagnostico(eventos, esporte, f"{team_name} — time não encontrado na API", prioridade)
                      return

                  team_id = teams[0].get("idTeam")
                  if not team_id:
                      adicionar_diagnostico(eventos, esporte, f"{team_name} — idTeam ausente", prioridade)
                      return

                  proximos = fetch_json("eventsnext.php", {"id": team_id})
                  eventos_time = proximos.get("events") or []

                  eventos_validos = [e for e in eventos_time if esta_no_periodo(e)]

                  if not eventos_validos:
                      adicionar_diagnostico(
                          eventos,
                          esporte,
                          f"{team_name} — sem jogos nos próximos {LIMITE_DIAS} dias",
                          prioridade
                      )
                      return

                  for event in eventos_validos[:10]:
                      eventos.append(format_event(event, esporte, transmissao, prioridade, team_name))

              except HTTPError as e:
                  adicionar_diagnostico(eventos, esporte, f"{team_name} — erro HTTP {e.code}", prioridade)
              except Exception as e:
                  adicionar_diagnostico(eventos, esporte, f"{team_name} — erro: {str(e)}", prioridade)

          def buscar_liga_proxima(league_id, nome, esporte, transmissao, prioridade, eventos, excluir=None):
              excluir = [normalizar(x) for x in (excluir or [])]

              try:
                  resp = fetch_json("eventsnextleague.php", {"id": league_id})
                  lista = resp.get("events") or []

                  encontrados = 0

                  for event in lista:
                      titulo = normalizar(event.get("strEvent"))
                      if any(x in titulo for x in excluir):
                          continue
                      if not esta_no_periodo(event):
                          continue

                      eventos.append(format_event(event, esporte, transmissao, prioridade, nome))
                      encontrados += 1

                  if encontrados == 0:
                      adicionar_diagnostico(
                          eventos,
                          esporte,
                          f"{nome} — sem jogos nos próximos {LIMITE_DIAS} dias",
                          prioridade
                      )

              except HTTPError as e:
                  adicionar_diagnostico(eventos, esporte, f"{nome} — erro HTTP {e.code}", prioridade)
              except Exception as e:
                  adicionar_diagnostico(eventos, esporte, f"{nome} — erro: {str(e)}", prioridade)

          eventos = []

          # =========================
          # FUTEBOL: foco por competição
          # =========================
          buscar_liga_proxima(
              "4351",
              "Brasileirão",
              "Futebol",
              "Globo / SporTV / Premiere",
              3,
              eventos
          )

          buscar_liga_proxima(
              "4725",
              "Copa do Brasil",
              "Futebol",
              "Globo / SporTV / Prime Video",
              3,
              eventos
          )

          buscar_liga_proxima(
              "4501",
              "Libertadores",
              "Futebol",
              "Globo / ESPN / Disney+",
              3,
              eventos
          )

          buscar_liga_proxima(
              "4724",
              "Sul-Americana",
              "Futebol",
              "ESPN / Disney+",
              3,
              eventos
          )

          # =========================
          # NBA e NFL: por time, com destaque futuro
          # =========================
          buscar_time(
              "Boston Celtics",
              "NBA",
              "ESPN / SporTV / NBA League Pass",
              2,
              eventos
          )

          buscar_time(
              "Seattle Seahawks",
              "NFL",
              "ESPN / SporTV / NFL Game Pass",
              2,
              eventos
          )

          # =========================
          # AUTOMOBILISMO: por categoria
          # =========================
          buscar_liga_proxima(
              "4370",
              "Formula 1",
              "Automobilismo",
              "Globo / SporTV / F1TV",
              2,
              eventos
          )

          buscar_liga_proxima(
              "4486",
              "Formula 2",
              "Automobilismo",
              "SporTV / F1TV",
              2,
              eventos
          )

          buscar_liga_proxima(
              "4407",
              "MotoGP",
              "Automobilismo",
              "ESPN / Disney+",
              2,
              eventos
          )

          buscar_liga_proxima(
              "4373",
              "IndyCar",
              "Automobilismo",
              "ESPN / Disney+",
              2,
              eventos
          )

          # =========================
          # TÊNIS: reservado para próxima fase
          # Grand Slams + Masters 1000 + destaque João Fonseca
          # =========================
          # Mantido fora desta versão para não misturar a refatoração do futebol
          # com a validação da fonte de dados do tênis.

          # Remove falsos positivos do automobilismo
          eventos_filtrados = []
          for e in eventos:
              titulo = normalizar(e.get("titulo"))
              if e.get("esporte") == "Automobilismo" and " vs " in titulo:
                  continue
              eventos_filtrados.append(e)

          # Remove duplicados
          vistos = set()
          eventos_unicos = []

          for e in eventos_filtrados:
              chave = (
                  e.get("titulo", ""),
                  e.get("data_ordem", ""),
                  e.get("origem", "")
              )
              if chave not in vistos:
                  vistos.add(chave)
                  eventos_unicos.append(e)

          eventos_unicos.sort(
              key=lambda x: (
                  x.get("prioridade", 99),
                  x.get("data_ordem", "9999-99-99T99:99:99")
              )
          )

          with open("eventos.json", "w", encoding="utf-8") as f:
              json.dump(eventos_unicos, f, ensure_ascii=False, indent=2)

          print(f"{len(eventos_unicos)} eventos salvos em eventos.json")
          PY

      - name: Commit e push
        run: |
          git config --global user.name "central-esportiva-bot"
          git config --global user.email "bot@users.noreply.github.com"
          git add eventos.json
          if ! git diff --cached --quiet; then
            git commit -m "Atualização automática de eventos"
            git push
          else
            echo "Sem mudanças para commit"
          fi
