name: Atualizar eventos reais

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v5

      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Verificar estrutura
        run: |
          pwd
          ls -la
          ls -la scripts || true

      - name: Gerar eventos reais
        run: python scripts/update_events.py

      - name: Commit e push
        run: |
          git config --global user.name "central-esportiva-bot"
          git config --global user.email "bot@users.noreply.github.com"
          git add eventos.json
          if ! git diff --cached --quiet; then
            git commit -m "Atualização automática de eventos"
            git push
          else
            echo "Sem mudanças para commit"
          fi
